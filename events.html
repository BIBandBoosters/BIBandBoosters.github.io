  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --royal: #1a3a8f; --royal-dark: #102570; --gold: #f5c518; --gold-dark: #d4a800;
      --white: #ffffff; --off-white: #f8f7f2; --text: #1a1a1a; --muted: #555;
    }
    body { font-family: 'Open Sans', sans-serif; color: var(--text); background: var(--off-white); }
    nav { background: var(--royal-dark); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .nav-logo-mark { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1rem; color: var(--royal-dark); }
    .nav-logo-text { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 1rem; color: var(--white); line-height: 1.2; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.875rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .page-header { background: var(--royal); color: var(--white); padding: 3rem 2rem 2.5rem; text-align: center; position: relative; overflow: hidden; }
    .page-header::before { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 50px; background: var(--off-white); clip-path: ellipse(55% 100% at 50% 100%); }
    .page-header .eyebrow { font-family: 'Oswald', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .page-header h1 { font-family: 'Oswald', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; }
    .calendar-section { max-width: 1000px; margin: 3rem auto; padding: 0 2rem; }
    .section-label { font-family: 'Oswald', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--royal); margin-bottom: 0.5rem; }
    .section-title { font-family: 'Oswald', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; color: var(--royal-dark); margin-bottom: 0.75rem; }
    .divider { width: 48px; height: 4px; background: var(--gold); margin-bottom: 1.5rem; border-radius: 2px; }
    .calendar-wrapper { border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 2px solid var(--royal); }
    .calendar-wrapper iframe { display: block; width: 100%; height: 600px; }
    footer { background: var(--royal-dark); color: rgba(255,255,255,0.6); text-align: center; padding: 1.25rem 2rem; font-size: 0.8rem; margin-top: 4rem; }
    footer strong { color: var(--gold); }
    @media (max-width: 720px) { .nav-links { display: none; } .calendar-wrapper iframe { height: 400px; } }
  </style>
</head>
<body>
  <nav>

  <div class="page-header">
    <div class="eyebrow">Bradwell Institute Band</div>
    <h1>Events &amp; Calendar</h1>
  </div>

    <div class="section-label">Stay in the Know</div>
    <h2 class="section-title">Band Booster Calendar</h2>
    <div class="divider"></div>
    <div class="calendar-wrapper">
      <iframe src="https://calendar.google.com/calendar/embed?src=bibandboosters%40bradwellinstituteband.org&ctz=America%2FNew_York" style="border: 0" frameborder="0" scrolling="no"></iframe>
    </div>
